name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "CHANGELOG.md"
      - ".release-please-manifest.json"
      - "version.txt"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: simple
