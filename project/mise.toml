[tools]
# Go
# go = "1.26"

# Node.js
# node = "24"
# pnpm = "10"

# Python
# python = "3.14"
# uv = "latest"

# Java / Kotlin
# java = "temurin-25"

# Terraform
# terraform = "1.14"

[env]
# PROJECT_NAME = "my-project"
